<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            height: 320px;
            background-color: #87B6BC;
            width: 500px;
            padding: 10px;
            text-align: center;
            margin: 30px auto;
            border-radius: 30px;
            box-shadow: 5px -5px 10px 15px #BED4CB;
        }

        h1 {
            color: #B35656;
            font-style: italic;
        }

        .main textarea {
            border-radius: 20px;
            padding: 10PX;
            background-color: #BED4CB;
            box-shadow: 5px 5px #F6F09F;
            font-size: 20px;
            font-style: italic;
        }
        p{
            font-size: 20px;
            padding: 0px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>LIVE CHARACTOR COUNTER</h1>
        <textarea id="textinput" cols="35" rows="7" placeholder="ENTER THE CHARACTERS" oninput="counter()"></textarea>

        <p>Characters: <span id="charCount">0</span></p>
    </div>
    <script>
        function counter() {
            let text = document.getElementById("textinput").value;
            let total = text.length;
            document.getElementById("charCount").textContent = total;
        }
    </script>
</body>

</html>
